<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{width:1080px;height:1080px;overflow:hidden;background:#07070A}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Montserrat',sans-serif;position:relative;background:#07070A}
.bg{position:absolute;inset:0;background:url('images/GEAR 1_web.jpg') center/cover no-repeat}
.overlay{position:absolute;inset:0;background:linear-gradient(110deg,rgba(7,7,10,.97) 0%,rgba(7,7,10,.93) 55%,rgba(7,7,10,.6) 100%)}
.corner-tl{position:absolute;top:52px;left:52px;width:72px;height:72px;border-top:2px solid rgba(201,169,60,.5);border-left:2px solid rgba(201,169,60,.5);z-index:3}
.corner-tr{position:absolute;top:52px;right:52px;width:72px;height:72px;border-top:2px solid rgba(201,169,60,.5);border-right:2px solid rgba(201,169,60,.5);z-index:3}
.corner-bl{position:absolute;bottom:52px;left:52px;width:72px;height:72px;border-bottom:2px solid rgba(201,169,60,.5);border-left:2px solid rgba(201,169,60,.5);z-index:3}
.corner-br{position:absolute;bottom:52px;right:52px;width:72px;height:72px;border-bottom:2px solid rgba(201,169,60,.5);border-right:2px solid rgba(201,169,60,.5);z-index:3}
.logo{position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:4;opacity:.65;filter:brightness(0) invert(1)}
.content{position:absolute;left:0;top:0;bottom:0;width:64%;display:flex;flex-direction:column;justify-content:center;padding:80px 60px 80px 88px;z-index:4}
.eyebrow{font-size:15px;font-weight:700;letter-spacing:.22em;color:rgba(201,169,60,.7);text-transform:uppercase;margin-bottom:16px}
.title{font-family:'Cormorant Garamond',serif;font-size:74px;font-weight:300;color:#fff;line-height:1.05;margin-bottom:36px}
.title em{color:#C9A93C;font-style:italic}
.features{display:flex;flex-direction:column;gap:0;margin-bottom:32px}
.feat{display:flex;gap:22px;padding:20px 0;border-bottom:1px solid rgba(255,255,255,.07);align-items:flex-start}
.feat:first-child{border-top:1px solid rgba(255,255,255,.07)}
.feat-num{font-family:'Cormorant Garamond',serif;font-size:44px;color:rgba(201,169,60,.25);line-height:1;min-width:40px;flex-shrink:0}
.feat-body{}
.feat-title{font-size:24px;color:#fff;font-weight:500;margin-bottom:5px;line-height:1.2}
.feat-desc{font-size:17px;color:rgba(255,255,255,.35);line-height:1.5}
.place{display:flex;gap:16px}
.place-item{border:1px solid rgba(255,255,255,.1);padding:16px 22px;background:rgba(255,255,255,.03)}
.place-item.gold{border-color:rgba(201,169,60,.35);background:rgba(201,169,60,.06)}
.pl-label{font-size:12px;font-weight:700;letter-spacing:.16em;color:rgba(201,169,60,.55);text-transform:uppercase;margin-bottom:6px}
.pl-main{font-size:20px;color:rgba(255,255,255,.75);font-weight:500}
.pl-sub{font-size:14px;color:rgba(255,255,255,.3);margin-top:3px}
.page{position:absolute;bottom:58px;right:88px;font-size:14px;font-weight:600;letter-spacing:.18em;color:rgba(255,255,255,.2);z-index:4}
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="corner-tl"></div><div class="corner-tr"></div>
<div class="corner-bl"></div><div class="corner-br"></div>
<div class="logo"><img src="images/MADEWELL MUSIC_LOGO_cropped.PNG" height="48"/></div>
<div class="content">
  <div class="eyebrow">Lesson Format · 레슨 방식</div>
  <div class="title">레슨은<br/><em>이렇게 합니다.</em></div>
  <div class="features">
    <div class="feat">
      <div class="feat-num">01</div>
      <div class="feat-body">
        <div class="feat-title">1:1 맞춤 커리큘럼</div>
        <div class="feat-desc">수강생 수준과 목표에 맞춰 처음부터 직접 설계</div>
      </div>
    </div>
    <div class="feat">
      <div class="feat-num">02</div>
      <div class="feat-body">
        <div class="feat-title">실제 작업물로 배운다</div>
        <div class="feat-desc">교재 없이 내 음악·내 보컬로 바로 실습</div>
      </div>
    </div>
    <div class="feat">
      <div class="feat-num">03</div>
      <div class="feat-body">
        <div class="feat-title">전문 스튜디오 환경</div>
        <div class="feat-desc">Neve · Pro Tools HDX · Neumann U87 — 레슨부터 프로 장비</div>
      </div>
    </div>
    <div class="feat">
      <div class="feat-num">04</div>
      <div class="feat-body">
        <div class="feat-title">레슨 후 녹음 파일 제공</div>
        <div class="feat-desc">수업 내용 복습용 녹음 파일 지원</div>
      </div>
    </div>
  </div>
  <div class="place">
    <div class="place-item gold">
      <div class="pl-label">오프라인</div>
      <div class="pl-main">강남 역삼동 스튜디오</div>
      <div class="pl-sub">선정릉역 1번 출구 40초</div>
    </div>
    <div class="place-item">
      <div class="pl-label">온라인</div>
      <div class="pl-main">전국 어디서든</div>
      <div class="pl-sub">Zoom · 화면 공유 실시간</div>
    </div>
  </div>
</div>
<div class="page">5 / 6</div>
</body>
</html>
