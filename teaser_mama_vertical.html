<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>MAMA — Vertical Teaser 1080×1920</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Montserrat',sans-serif}

/* 다운로드 버튼 */
#save-btn{
  position:fixed;top:18px;right:18px;z-index:9999;
  background:rgba(65,168,182,.95);color:#040e12;
  font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  padding:12px 22px;border:none;cursor:pointer;
  box-shadow:0 4px 20px rgba(52,138,150,.5);
  transition:all .2s;
}
#save-btn:hover{background:#5bc8d8;transform:translateY(-1px)}
#save-btn:disabled{opacity:.5;cursor:wait}

/* 프레임 — 1080×1920 비율로 화면에 맞게 스케일 */
#scale-wrap{
  position:relative;
  transform-origin:top center;
}

/* 실제 렌더 타겟 */
#frame{
  width:1080px;
  height:1920px;
  position:relative;
  overflow:hidden;
  background:#050e12;
}

.bg{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 55% at 50% 32%, rgba(52,138,150,.22) 0%, transparent 56%),
    radial-gradient(ellipse 50% 40% at 18% 75%, rgba(30,90,100,.15) 0%, transparent 50%),
    linear-gradient(180deg, #050e12 0%, #091d25 42%, #050e12 100%);
}

.photo{
  position:absolute;inset:0;z-index:1;
  background-image:url('images/artist_new.png');
  background-size:cover;
  background-position:center 8%;
  opacity:.74;
  filter:brightness(1.06) contrast(1.08) saturate(0.88);
  -webkit-mask-image:linear-gradient(to bottom,
    rgba(0,0,0,1) 0%, rgba(0,0,0,.9) 42%,
    rgba(0,0,0,.45) 68%, rgba(0,0,0,0) 100%);
  mask-image:linear-gradient(to bottom,
    rgba(0,0,0,1) 0%, rgba(0,0,0,.9) 42%,
    rgba(0,0,0,.45) 68%, rgba(0,0,0,0) 100%);
}

.fade-bottom{
  position:absolute;inset:0;z-index:2;
  background:linear-gradient(to bottom,
    transparent 50%, rgba(5,14,18,.7) 70%,
    rgba(5,14,18,.97) 86%, #050e12 100%);
}

.content{
  position:absolute;z-index:3;
  bottom:148px;left:76px;right:76px;
}

.eyebrow{
  font-size:12px;font-weight:700;letter-spacing:.36em;
  color:rgba(95,200,215,.65);text-transform:uppercase;
  margin-bottom:26px;display:flex;align-items:center;gap:14px;
}
.eyebrow::after{content:'';width:38px;height:1px;background:rgba(95,200,215,.35)}

.album-tag{
  font-family:'Josefin Sans',sans-serif;font-weight:100;
  font-size:14px;letter-spacing:.56em;
  color:rgba(95,200,215,.42);text-transform:uppercase;margin-bottom:14px;
}

.title-main{
  font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;
  font-size:140px;line-height:.86;
  color:rgba(255,255,255,.93);letter-spacing:-.02em;margin-bottom:4px;
}
.title-sub{
  font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;
  font-size:56px;line-height:1.1;
  color:rgba(95,200,215,.82);letter-spacing:.01em;margin-bottom:52px;
}

.divider{width:100%;height:1px;
  background:linear-gradient(to right,rgba(95,200,215,.22),rgba(95,200,215,.06) 65%,transparent);
  margin-bottom:30px;
}

.meta{
  font-family:'Josefin Sans',sans-serif;font-weight:100;
  font-size:12px;letter-spacing:.36em;
  color:rgba(255,255,255,.22);text-transform:uppercase;line-height:2.2;
}
.meta strong{color:rgba(95,200,215,.48);font-weight:300}

.watermark{
  position:absolute;z-index:3;top:64px;right:68px;
  font-family:'Josefin Sans',sans-serif;font-weight:100;
  font-size:11px;letter-spacing:.46em;
  color:rgba(255,255,255,.13);text-transform:uppercase;
}
.corner-tl{position:absolute;z-index:3;top:64px;left:68px;width:28px;height:28px;border-top:1px solid rgba(95,200,215,.2);border-left:1px solid rgba(95,200,215,.2)}
.corner-br{position:absolute;z-index:3;bottom:64px;right:68px;width:28px;height:28px;border-bottom:1px solid rgba(95,200,215,.2);border-right:1px solid rgba(95,200,215,.2)}
</style>
</head>
<body>

<button id="save-btn" onclick="saveImage()">📥 PNG 저장</button>

<div id="scale-wrap">
  <div id="frame">
    <div class="bg"></div>
    <div class="photo"></div>
    <div class="fade-bottom"></div>
    <div class="corner-tl"></div>
    <div class="corner-br"></div>
    <div class="watermark">MADEWELL MUSIC</div>
    <div class="content">
      <div class="eyebrow">MADEWELL · 3RD SOLO ALBUM · 2026</div>
      <div class="album-tag">3RD SOLO ALBUM</div>
      <div class="title-main">MAMA</div>
      <div class="title-sub">THE ETERNAL LOVE</div>
      <div class="divider"></div>
      <div class="meta"><strong>RELEASE</strong> 2026.06 &nbsp;·&nbsp; MADEWELL MUSIC</div>
    </div>
  </div>
</div>

<script>
// 화면에 맞게 스케일
function scaleFrame() {
  const wrap = document.getElementById('scale-wrap');
  const frame = document.getElementById('frame');
  const W = 1080, H = 1920;
  const vw = window.innerWidth, vh = window.innerHeight - 20;
  const scale = Math.min(vw / W, vh / H);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = W + 'px';
  wrap.style.height = H + 'px';
  // body 높이 맞추기
  document.body.style.height = Math.ceil(H * scale + 20) + 'px';
}
scaleFrame();
window.addEventListener('resize', scaleFrame);

// PNG 저장
async function saveImage() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  try {
    const canvas = await html2canvas(document.getElementById('frame'), {
      width: 1080, height: 1920,
      scale: 1,
      useCORS: true,
      logging: false,
      backgroundColor: '#050e12'
    });
    const link = document.createElement('a');
    link.download = 'MAMA_teaser_vertical_1080x1920.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) { alert('저장 실패: ' + e.message); }
  btn.disabled = false;
  btn.textContent = '📥 PNG 저장';
}
</script>
</body>
</html>
