<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{width:1080px;height:1080px;overflow:hidden;background:#080612}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Montserrat',sans-serif;position:relative;background:#080612}
.bg{position:absolute;inset:0;background:url('images/GEAR 1_web.jpg') center/cover no-repeat;opacity:.1}
.overlay{position:absolute;inset:0;background:linear-gradient(110deg,rgba(8,6,18,.98) 0%,rgba(30,12,70,.9) 55%,rgba(8,6,18,.97) 100%)}
.glow{position:absolute;top:20%;right:10%;width:500px;height:500px;background:radial-gradient(ellipse,rgba(96,64,168,.25) 0%,transparent 70%)}
.corner-tl{position:absolute;top:52px;left:52px;width:72px;height:72px;border-top:2px solid rgba(139,92,246,.5);border-left:2px solid rgba(139,92,246,.5);z-index:3}
.corner-tr{position:absolute;top:52px;right:52px;width:72px;height:72px;border-top:2px solid rgba(139,92,246,.5);border-right:2px solid rgba(139,92,246,.5);z-index:3}
.corner-bl{position:absolute;bottom:52px;left:52px;width:72px;height:72px;border-bottom:2px solid rgba(139,92,246,.5);border-left:2px solid rgba(139,92,246,.5);z-index:3}
.corner-br{position:absolute;bottom:52px;right:52px;width:72px;height:72px;border-bottom:2px solid rgba(139,92,246,.5);border-right:2px solid rgba(139,92,246,.5);z-index:3}
.logo{position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:4;opacity:.65;filter:brightness(0) invert(1)}
.content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:80px 88px;z-index:4}
.eyebrow{font-size:15px;font-weight:700;letter-spacing:.22em;color:rgba(167,139,250,.7);text-transform:uppercase;margin-bottom:14px}
.title{font-family:'Cormorant Garamond',serif;font-size:78px;font-weight:300;color:#fff;line-height:1.04;margin-bottom:36px}
.title em{color:#A78BFA;font-style:italic}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:32px}
.col-label{font-size:12px;font-weight:700;letter-spacing:.2em;color:rgba(139,92,246,.5);text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(139,92,246,.2)}
.checks{display:flex;flex-direction:column;gap:0}
.check{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.ck-mark{width:24px;height:24px;border:1.5px solid rgba(139,92,246,.5);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ck-inner{width:8px;height:8px;background:#8B5CF6}
.ck-text{font-size:21px;color:rgba(255,255,255,.7);line-height:1.3}
.feats{display:flex;flex-direction:column;gap:0}
.feat{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);align-items:flex-start}
.feat-num{font-family:'Cormorant Garamond',serif;font-size:36px;color:rgba(139,92,246,.25);line-height:1;min-width:32px;flex-shrink:0}
.feat-title{font-size:20px;color:#fff;font-weight:500;margin-bottom:3px}
.feat-desc{font-size:15px;color:rgba(255,255,255,.32);line-height:1.45}
.page{position:absolute;bottom:58px;right:88px;font-size:14px;font-weight:600;letter-spacing:.18em;color:rgba(255,255,255,.2);z-index:4}
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="glow"></div>
<div class="corner-tl"></div><div class="corner-tr"></div>
<div class="corner-bl"></div><div class="corner-br"></div>
<div class="logo"><img src="images/MADEWELL MUSIC_LOGO_cropped.PNG" height="48"/></div>
<div class="content">
  <div class="eyebrow">For You · Lesson Format</div>
  <div class="title">이런 분께,<br/><em>이렇게 합니다.</em></div>
  <div class="two-col">
    <div>
      <div class="col-label">혹시 해당되시나요?</div>
      <div class="checks">
        <div class="check"><div class="ck-mark"><div class="ck-inner"></div></div><div class="ck-text">노래가 좋은데 발성을 모르겠어</div></div>
        <div class="check"><div class="ck-mark"><div class="ck-inner"></div></div><div class="ck-text">작곡 해보고 싶은데 시작점을 모르겠어</div></div>
        <div class="check"><div class="ck-mark"><div class="ck-inner"></div></div><div class="ck-text">홈레코딩 소리가 아마추어 같아</div></div>
        <div class="check"><div class="ck-mark"><div class="ck-inner"></div></div><div class="ck-text">오디션 · 데뷔 준비 중인데 막막해</div></div>
        <div class="check"><div class="ck-mark"><div class="ck-inner"></div></div><div class="ck-text">취미로 음악 배우고 싶어</div></div>
      </div>
    </div>
    <div>
      <div class="col-label">레슨 방식</div>
      <div class="feats">
        <div class="feat"><div class="feat-num">01</div><div><div class="feat-title">1:1 맞춤 커리큘럼</div><div class="feat-desc">수준·목표에 맞게 처음부터 직접 설계</div></div></div>
        <div class="feat"><div class="feat-num">02</div><div><div class="feat-title">내 작업물로 바로 실습</div><div class="feat-desc">교재 없이 실전 음악으로 진행</div></div></div>
        <div class="feat"><div class="feat-num">03</div><div><div class="feat-title">프로 스튜디오 환경</div><div class="feat-desc">Neve · Pro Tools · Neumann U87</div></div></div>
        <div class="feat"><div class="feat-num">04</div><div><div class="feat-title">강남 역삼동 · 온라인</div><div class="feat-desc">전국 어디서든 온라인 레슨 가능</div></div></div>
      </div>
    </div>
  </div>
</div>
<div class="page">5 / 6</div>
</body>
</html>
