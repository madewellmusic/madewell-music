<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Montserrat',sans-serif;position:relative;background:#07070A}
.bg{position:absolute;inset:0;background:url('images/MIC.jpg') center/cover no-repeat}
.overlay{position:absolute;inset:0;background:linear-gradient(110deg,rgba(7,7,10,.97) 0%,rgba(7,7,10,.92) 55%,rgba(7,7,10,.55) 100%)}
.corner-tl{position:absolute;top:52px;left:52px;width:72px;height:72px;border-top:2px solid rgba(201,169,60,.5);border-left:2px solid rgba(201,169,60,.5);z-index:3}
.corner-tr{position:absolute;top:52px;right:52px;width:72px;height:72px;border-top:2px solid rgba(201,169,60,.5);border-right:2px solid rgba(201,169,60,.5);z-index:3}
.corner-bl{position:absolute;bottom:52px;left:52px;width:72px;height:72px;border-bottom:2px solid rgba(201,169,60,.5);border-left:2px solid rgba(201,169,60,.5);z-index:3}
.corner-br{position:absolute;bottom:52px;right:52px;width:72px;height:72px;border-bottom:2px solid rgba(201,169,60,.5);border-right:2px solid rgba(201,169,60,.5);z-index:3}
.logo{position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:4;opacity:.65;filter:brightness(0) invert(1)}
.content{position:absolute;left:0;top:0;bottom:0;width:64%;display:flex;flex-direction:column;justify-content:center;padding:80px 72px;z-index:4}
.tag{font-size:15px;font-weight:700;letter-spacing:.22em;color:rgba(201,169,60,.7);text-transform:uppercase;margin-bottom:24px}
.title{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;color:#fff;line-height:1.06;margin-bottom:48px}
.title em{color:#C9A93C;font-style:italic}
.items{display:flex;flex-direction:column;gap:0;margin-bottom:36px}
.item{display:flex;align-items:center;justify-content:space-between;padding:24px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.item:first-child{border-top:1px solid rgba(255,255,255,.07)}
.item.hl{background:rgba(201,169,60,.04);margin:0 -16px;padding:24px 16px;border-color:rgba(201,169,60,.2)}
.i-name{font-size:24px;color:#fff;font-weight:400}
.i-name span{display:block;font-size:16px;color:rgba(255,255,255,.3);font-weight:300;margin-top:4px}
.i-price{font-family:'Cormorant Garamond',serif;font-size:52px;color:#C9A93C;text-align:right;white-space:nowrap}
.i-price sub{font-size:18px;color:rgba(255,255,255,.3);font-family:'Montserrat',sans-serif}
.notes{font-size:18px;color:rgba(255,255,255,.28);line-height:1.8;letter-spacing:.04em}
.notes strong{color:rgba(255,255,255,.5);font-weight:500}
.page{position:absolute;bottom:58px;right:88px;font-size:14px;font-weight:600;letter-spacing:.18em;color:rgba(255,255,255,.2);z-index:4}
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="corner-tl"></div><div class="corner-tr"></div>
<div class="corner-bl"></div><div class="corner-br"></div>
<div class="logo"><img src="images/MADEWELL MUSIC_LOGO_cropped.PNG" height="48"/></div>
<div class="content">
  <div class="tag">Services &amp; Pricing</div>
  <div class="title">합리적인 가격,<br/><em>프리미엄 퀄리티.</em></div>
  <div class="items">
    <div class="item">
      <div class="i-name">마스터링 단독<span>하드웨어 · LUFS 최적화</span></div>
      <div class="i-price">10만<sub> / 곡</sub></div>
    </div>
    <div class="item">
      <div class="i-name">믹싱 + 마스터링<span>SNS · 스트리밍 최적화</span></div>
      <div class="i-price">25만<sub> / 곡</sub></div>
    </div>
    <div class="item hl">
      <div class="i-name">풀 믹싱 + 마스터링<span>멀티트랙 · 아이돌 워크플로우</span></div>
      <div class="i-price">45만<sub> / 곡</sub></div>
    </div>
    <div class="item">
      <div class="i-name">보컬 레코딩<span>Neumann U87 · NEVE 1073</span></div>
      <div class="i-price">20만<sub> / 3.5h</sub></div>
    </div>
  </div>
  <div class="notes">
    <strong>픽스 전 자유 수정</strong> · WAV + MP3 납품<br/>
    온라인 파일 의뢰 가능 · 전국 어디서든
  </div>
</div>
<div class="page">5 / 6</div>
</body>
</html>
