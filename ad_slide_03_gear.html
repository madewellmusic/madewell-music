<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Montserrat',sans-serif;position:relative;background:#07070A}
.bg{position:absolute;inset:0;background:url('images/GEAR 1_web.jpg') center/cover no-repeat}
.overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,7,10,.95) 0%,rgba(7,7,10,.7) 40%,rgba(7,7,10,.92) 100%)}
.corner-tl{position:absolute;top:52px;left:52px;width:72px;height:72px;border-top:2px solid rgba(201,169,60,.5);border-left:2px solid rgba(201,169,60,.5);z-index:3}
.corner-tr{position:absolute;top:52px;right:52px;width:72px;height:72px;border-top:2px solid rgba(201,169,60,.5);border-right:2px solid rgba(201,169,60,.5);z-index:3}
.corner-bl{position:absolute;bottom:52px;left:52px;width:72px;height:72px;border-bottom:2px solid rgba(201,169,60,.5);border-left:2px solid rgba(201,169,60,.5);z-index:3}
.corner-br{position:absolute;bottom:52px;right:52px;width:72px;height:72px;border-bottom:2px solid rgba(201,169,60,.5);border-right:2px solid rgba(201,169,60,.5);z-index:3}
.logo{position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:4;opacity:.65;filter:brightness(0) invert(1)}
.content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 96px;z-index:4}
.tag{font-size:16px;font-weight:700;letter-spacing:.24em;color:rgba(201,169,60,.7);text-transform:uppercase;margin-bottom:28px}
.title{font-family:'Cormorant Garamond',serif;font-size:88px;font-weight:300;color:#fff;line-height:1.06;margin-bottom:56px}
.title em{color:#C9A93C;font-style:italic}
.gear-list{display:flex;flex-direction:column;gap:16px;margin-bottom:56px;width:100%}
.gear-item{display:flex;align-items:center;gap:20px;padding:20px 28px;border:1px solid rgba(255,255,255,.08);background:rgba(7,7,10,.5)}
.gear-item.gold{border-color:rgba(201,169,60,.3);background:rgba(201,169,60,.05)}
.g-dot{width:6px;height:6px;border-radius:50%;background:rgba(201,169,60,.6);flex-shrink:0}
.g-name{font-size:24px;color:#fff;letter-spacing:.05em}
.gear-item.gold .g-name{color:#C9A93C}
.g-cat{font-size:13px;font-weight:600;letter-spacing:.14em;color:rgba(255,255,255,.25);text-transform:uppercase;margin-left:auto}
.footer{font-size:19px;color:rgba(255,255,255,.3);letter-spacing:.1em}
.page{position:absolute;bottom:58px;right:88px;font-size:14px;font-weight:600;letter-spacing:.18em;color:rgba(255,255,255,.2);z-index:4}
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="corner-tl"></div><div class="corner-tr"></div>
<div class="corner-bl"></div><div class="corner-br"></div>
<div class="logo"><img src="images/MADEWELL MUSIC_LOGO_cropped.PNG" height="48"/></div>
<div class="content">
  <div class="tag">Hardware Chain · Studio Gear</div>
  <div class="title">아이돌 앨범과 <em>동일한 장비.</em></div>
  <div class="gear-list">
    <div class="gear-item gold">
      <div class="g-dot"></div>
      <div class="g-name">AMS NEVE 1073</div>
      <div class="g-cat">Preamp</div>
    </div>
    <div class="gear-item gold">
      <div class="g-dot"></div>
      <div class="g-name">BETTERMAKER Mastering Limiter</div>
      <div class="g-cat">Limiter</div>
    </div>
    <div class="gear-item gold">
      <div class="g-dot"></div>
      <div class="g-name">LAVRY GOLD SAVITR</div>
      <div class="g-cat">AD/DA</div>
    </div>
    <div class="gear-item gold">
      <div class="g-dot"></div>
      <div class="g-name">Neumann U87 Ai</div>
      <div class="g-cat">Microphone</div>
    </div>
    <div class="gear-item">
      <div class="g-dot"></div>
      <div class="g-name">BAREFOOT MicroMain 27 · Pro Tools HDX</div>
      <div class="g-cat">Monitor / DAW</div>
    </div>
  </div>
  <div class="footer">아이돌 프로듀서가 직접 핸들링 · 강남 역삼동</div>
</div>
<div class="page">4 / 6</div>
</body>
</html>
