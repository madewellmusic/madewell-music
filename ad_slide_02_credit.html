<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Montserrat',sans-serif;position:relative;background:#07070A}
.bg{position:absolute;right:0;top:0;width:48%;height:100%;background:url('images/메이드웰_프로필2.jpg') center top/cover no-repeat;opacity:.7}
.bg-fade{position:absolute;right:0;top:0;width:48%;height:100%;background:linear-gradient(to right,#07070A 0%,rgba(7,7,10,.1) 55%,rgba(7,7,10,.5) 100%);z-index:2}
.corner-tl{position:absolute;top:52px;left:52px;width:72px;height:72px;border-top:2px solid rgba(201,169,60,.5);border-left:2px solid rgba(201,169,60,.5);z-index:5}
.corner-tr{position:absolute;top:52px;right:52px;width:72px;height:72px;border-top:2px solid rgba(201,169,60,.5);border-right:2px solid rgba(201,169,60,.5);z-index:5}
.corner-bl{position:absolute;bottom:52px;left:52px;width:72px;height:72px;border-bottom:2px solid rgba(201,169,60,.5);border-left:2px solid rgba(201,169,60,.5);z-index:5}
.corner-br{position:absolute;bottom:52px;right:52px;width:72px;height:72px;border-bottom:2px solid rgba(201,169,60,.5);border-right:2px solid rgba(201,169,60,.5);z-index:5}
.logo{position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:6;opacity:.65;filter:brightness(0) invert(1)}
.content{position:absolute;left:0;top:0;bottom:0;width:56%;display:flex;flex-direction:column;justify-content:center;padding:80px 60px 80px 80px;z-index:4}
.tag{font-size:15px;font-weight:700;letter-spacing:.22em;color:rgba(201,169,60,.7);text-transform:uppercase;margin-bottom:24px}
.title{font-family:'Cormorant Garamond',serif;font-size:68px;font-weight:300;color:#fff;line-height:1.06;margin-bottom:36px}
.title em{color:#C9A93C;font-style:italic}
.divider{width:44px;height:2px;background:rgba(201,169,60,.4);margin-bottom:32px}
.credits{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:rgba(255,255,255,.75);line-height:1.75;margin-bottom:40px}
.credits em{color:#C9A93C;font-style:normal;font-weight:400}
.hook{padding:22px 24px;border-left:3px solid #C9A93C;background:rgba(201,169,60,.05)}
.hook-main{font-size:22px;font-weight:700;color:#C9A93C;letter-spacing:.02em;margin-bottom:6px}
.hook-sub{font-size:18px;color:rgba(255,255,255,.35);line-height:1.6}
.page{position:absolute;bottom:58px;right:88px;font-size:14px;font-weight:600;letter-spacing:.18em;color:rgba(255,255,255,.2);z-index:5}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-fade"></div>
<div class="corner-tl"></div><div class="corner-tr"></div>
<div class="corner-bl"></div><div class="corner-br"></div>
<div class="logo"><img src="images/MADEWELL MUSIC_LOGO_cropped.PNG" height="48"/></div>
<div class="content">
  <div class="tag">Artist Credits · 정균 (MADEWELL)</div>
  <div class="title">이들이 거쳐간<br/><em>스튜디오,</em><br/>지금은 당신.</div>
  <div class="divider"></div>
  <div class="credits">
    <em>VIVIZ · 인피니트 장동우</em><br/>
    <em>마마무 화사 · (G)IDLE 전소연</em><br/>
    소년판타지 · B:My BOYZ<br/>
    수상한그녀 OST · 원팩트 등
  </div>
  <div class="hook">
    <div class="hook-main">방구석 홈레코딩도, 아마추어 작업물도 OK.</div>
    <div class="hook-sub">같은 손, 같은 장비 · 온라인 의뢰 가능</div>
  </div>
</div>
<div class="page">3 / 6</div>
</body>
</html>
