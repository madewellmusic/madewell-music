<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap');
body{width:1080px;height:1080px;overflow:hidden;font-family:'Montserrat',sans-serif;position:relative}
.bg{position:absolute;inset:0;background:url('images/MAIN ROOM.jpg') center/cover no-repeat}
.overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(7,7,10,.85) 0%,rgba(7,7,10,.5) 50%,rgba(7,7,10,.75) 100%)}
.corner-tl{position:absolute;top:44px;left:44px;width:48px;height:48px;border-top:1px solid rgba(201,169,60,.5);border-left:1px solid rgba(201,169,60,.5);z-index:2}
.corner-tr{position:absolute;top:44px;right:44px;width:48px;height:48px;border-top:1px solid rgba(201,169,60,.5);border-right:1px solid rgba(201,169,60,.5);z-index:2}
.corner-bl{position:absolute;bottom:44px;left:44px;width:48px;height:48px;border-bottom:1px solid rgba(201,169,60,.5);border-left:1px solid rgba(201,169,60,.5);z-index:2}
.corner-br{position:absolute;bottom:44px;right:44px;width:48px;height:48px;border-bottom:1px solid rgba(201,169,60,.5);border-right:1px solid rgba(201,169,60,.5);z-index:2}
.content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:80px 84px;z-index:3}
.tag{font-size:10px;font-weight:700;letter-spacing:.28em;color:rgba(201,169,60,.8);text-transform:uppercase;margin-bottom:24px}
.main{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;color:#fff;line-height:1.08;letter-spacing:.01em;margin-bottom:20px}
.main em{color:#C9A93C;font-style:italic}
.sub{font-size:13px;color:rgba(255,255,255,.55);letter-spacing:.1em;line-height:1.9;margin-bottom:44px}
.sub strong{color:rgba(255,255,255,.9);font-weight:500}
.stats{display:flex;gap:0;border-top:1px solid rgba(255,255,255,.1);padding-top:28px}
.stat{flex:1;border-right:1px solid rgba(255,255,255,.08);padding-right:28px;margin-right:28px}
.stat:last-child{border-right:none;padding-right:0;margin-right:0}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:#C9A93C;line-height:1}
.stat-l{font-size:9px;font-weight:600;letter-spacing:.16em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-top:6px}
.logo{position:absolute;top:48px;left:50%;transform:translateX(-50%);z-index:3;opacity:.6;filter:brightness(0) invert(1)}
.page{position:absolute;bottom:50px;right:80px;font-size:9px;font-weight:600;letter-spacing:.18em;color:rgba(255,255,255,.2);z-index:3}
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="corner-tl"></div><div class="corner-tr"></div>
<div class="corner-bl"></div><div class="corner-br"></div>
<div class="logo"><img src="images/MADEWELL MUSIC_LOGO_cropped.PNG" height="40"/></div>
<div class="content">
  <div class="tag">Gangnam · Yeoksam Studio · Seoul</div>
  <div class="main">수많은 K-POP<br/>스타들의 음악이<br/>탄생한 곳,<br/><em>지금은 당신</em><br/>차례입니다.</div>
  <div class="sub">
    <strong>믹싱 · 마스터링 · 레코딩 · 레슨</strong><br/>
    온라인 파일 의뢰 가능 · 마스터링 10만원부터
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-n">100+</div>
      <div class="stat-l">KOMCA 등록곡</div>
    </div>
    <div class="stat">
      <div class="stat-n">10만~</div>
      <div class="stat-l">마스터링 단독</div>
    </div>
    <div class="stat">
      <div class="stat-n">40초</div>
      <div class="stat-l">선정릉역 도보</div>
    </div>
    <div class="stat">
      <div class="stat-n">24H</div>
      <div class="stat-l">온라인 의뢰</div>
    </div>
  </div>
</div>
<div class="page">1 / 6</div>
</body>
</html>
